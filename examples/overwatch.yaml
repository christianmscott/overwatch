# Overwatch configuration
# See: https://github.com/christianmscott/overwatch

server:
  bind_address: 127.0.0.1       # address to listen on (default: 127.0.0.1)
  bind_port: 3030               # port to listen on (default: 3030)
  external_address:              # hostname or IP clients use to reach this server
  external_port:                 # public-facing port (e.g. 443 behind a TLS proxy)
  concurrency: 4                # max concurrent healthchecks (default: 4)
  join_token:                    # token for TUI/CLI clients to authenticate
  authorized_users:              # pre-authorized public keys
    # - key_id: my-key
    #   public_key: base64...
    #   label: jims-computer.local

checks:
  - name: example-http
    type: http
    target: https://example.com
    interval: 60s                # time between checks (default: 60s)
    timeout: 10s                 # per-check timeout (default: 10s)
    expected_status: 200         # expected HTTP status code (default: 200)
    headers:                     # custom request headers
      Authorization: Bearer tok123
      Accept: application/json
    alerts:                      # alert destinations to notify on state change
      - slack

